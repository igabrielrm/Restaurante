spring.application.name=restaurante

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurante_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

server.port=${PORT:${SERVER_PORT:8085}}
server.forward-headers-strategy=framework
app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
